name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Lint, Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Lint
        id: lint
        run: npm run lint
        continue-on-error: true

      - name: Format check
        id: format
        run: npm run format:check
        continue-on-error: true

      - name: Compose CI summary
        id: summary
        uses: actions/github-script@v8
        with:
          script: |
            const lint = '${{ steps.lint.outcome }}';
            const format = '${{ steps.format.outcome }}';

            const icon = (s) => s === 'success' ? '✅' : '❌';
            const rows = [
              `| Lint | ${icon(lint)} ${lint} |`,
              `| Format | ${icon(format)} ${format} |`,
            ].join('\n');

            const table = `| Check | Result |\n|---|---|\n${rows}`;

            const failed = [lint, format].some(s => s !== 'success');

            let body;
            if (failed) {
              const failures = [];
              if (lint !== 'success') failures.push('`npm run lint`');
              if (format !== 'success') failures.push('`npm run format:check`');
              body = `### Hey Claude —\n\nThe following checks failed: ${failures.join(', ')}. Fix the issues, commit, and push.\n\n${table}`;
            } else {
              body = `### ✅ All checks passed\n\n${table}`;
            }

            core.setOutput('body', body);
            core.setOutput('failed', failed.toString());

      - name: Post sticky comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: ci-summary
          message: ${{ steps.summary.outputs.body }}

      - name: Fail if checks failed
        if: steps.summary.outputs.failed == 'true'
        run: exit 1

  pr-validation:
    name: PR Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check golden rule violations
        id: golden-rules
        run: |
          violations=""

          # Get changed/added files relative to base branch
          changed_files=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD 2>/dev/null || echo "")

          # Rule: No bundler config files
          for bundler_config in webpack.config.js vite.config.js vite.config.ts rollup.config.js esbuild.config.js; do
            if echo "$changed_files" | grep -qx "$bundler_config"; then
              violations="${violations}No bundlers without an ADR — \`${bundler_config}\` requires an ADR per CLAUDE.md Golden Rule 2\n"
            fi
          done

          # Rule: No TypeScript files
          if echo "$changed_files" | grep -qE '\.(ts|tsx)$'; then
            violations="${violations}No TypeScript without an ADR — \`.ts\`/\`.tsx\` files require an ADR per CLAUDE.md Golden Rule 3\n"
          fi

          # Rule: No .env files (allow .env.example and *.local)
          if echo "$changed_files" | grep -E '^\.(env)$|^\.(env)\.[^.]+$' | grep -vE '\.example$|\.local$'; then
            violations="${violations}No secrets in the repo — \`.env\` files must not be committed\n"
          fi

          echo "violations<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$violations" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate PR description and compose results
        id: validate
        uses: actions/github-script@v8
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const body = pr.body || '';
            const author = pr.user.login;
            const goldenViolations = `${{ steps.golden-rules.outputs.violations }}`.trim();

            // --- Human vs. Agent detection ---
            const skipAuthors = ['dependabot[bot]', 'renovate[bot]'];
            const isBot = skipAuthors.includes(author);
            const hasAgentReflection = body.includes('## Task Fidelity');

            // Strip HTML comments for content checks
            const stripped = body.replace(/<!--[\s\S]*?-->/g, '');
            const reflectionUncommented = stripped.includes('## Task Fidelity');

            let descriptionErrors = [];
            let descriptionSkipped = false;

            if (isBot) {
              descriptionSkipped = true;
            } else if (!hasAgentReflection) {
              // Human PR — no agent reflection present at all
              descriptionSkipped = true;
            } else {
              // Agent PR — validate

              // Check 1: Reflection sections are uncommented
              if (!reflectionUncommented) {
                descriptionErrors.push(
                  'Agent Reflection sections are still inside HTML comments — uncomment them'
                );
              }

              if (reflectionUncommented) {
                // Check 2: Required headings exist
                const requiredHeadings = [
                  'Task Fidelity',
                  'Task as Given',
                  'Task as Delivered',
                  'Delta',
                  'Deferred',
                  'Confidence',
                  'Drift Risk',
                  'Suggested Squash Commit Message',
                ];
                for (const heading of requiredHeadings) {
                  const pattern = new RegExp(`^#{2,3}\\s+.*${heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}`, 'm');
                  if (!pattern.test(stripped)) {
                    descriptionErrors.push(`Missing required heading: "${heading}"`);
                  }
                }

                // Check 3: Task as Given has substantive content
                const taskAsGivenMatch = stripped.match(
                  /###\s+Task as Given\s*\n([\s\S]*?)(?=\n##|\n###|$)/
                );
                if (taskAsGivenMatch) {
                  const section = taskAsGivenMatch[1];
                  const quoteLines = section
                    .split('\n')
                    .filter((l) => l.startsWith('>'))
                    .map((l) => l.replace(/^>\s*/, '').trim())
                    .filter((l) => l.length > 10 && !l.includes('Paste or summarize'));
                  if (quoteLines.length === 0) {
                    descriptionErrors.push(
                      '"Task as Given" must contain a substantive blockquote (not placeholder text)'
                    );
                  }
                }

                // Check 4: Confidence rating present
                const hasRating =
                  stripped.includes('Ship it') ||
                  stripped.includes('Verify') ||
                  stripped.includes('Caution');
                if (!hasRating) {
                  descriptionErrors.push(
                    'Confidence section must contain one of: "Ship it", "Verify", or "Caution"'
                  );
                }

                // Check 5: Summary has real content
                const summaryMatch = stripped.match(
                  /##\s+Summary\s*\n([\s\S]*?)(?=\n##)/
                );
                if (summaryMatch) {
                  const summaryText = summaryMatch[1]
                    .replace(/<!--[\s\S]*?-->/g, '')
                    .trim();
                  if (
                    summaryText.length < 20 ||
                    summaryText.includes('What changed, and why?')
                  ) {
                    descriptionErrors.push(
                      'Summary must have real content (>20 chars, not placeholder)'
                    );
                  }
                } else {
                  descriptionErrors.push('Summary section is missing or empty');
                }

                // Check 6: Changes has real bullets
                const changesMatch = stripped.match(
                  /##\s+Changes\s*\n([\s\S]*?)(?=\n##)/
                );
                if (changesMatch) {
                  const bullets = changesMatch[1]
                    .split('\n')
                    .filter((l) => /^- .{3,}/.test(l.trim()));
                  if (bullets.length === 0) {
                    descriptionErrors.push(
                      'Changes must have at least one real bullet point (not just "-")'
                    );
                  }
                }

                // Check 7: Drift Risk has real content
                const driftMatch = stripped.match(
                  /##\s+Drift Risk\s*\n([\s\S]*?)(?=\n##|$)/
                );
                if (driftMatch) {
                  const driftText = driftMatch[1].trim();
                  const hasTable = driftText.includes('| ADR') && /\|\s*\[?\d{4}\]?/.test(driftText);
                  const hasExplicitNone = /no drift risk/i.test(driftText);
                  const isPlaceholder = driftText.includes('example.js');
                  if (!hasTable && !hasExplicitNone) {
                    descriptionErrors.push(
                      'Drift Risk must contain either an ADR touchpoint table or "No drift risk — no ADR touchpoints affected."'
                    );
                  }
                  if (isPlaceholder && !hasExplicitNone) {
                    descriptionErrors.push(
                      'Drift Risk still contains placeholder text — replace with actual assessment'
                    );
                  }
                }

                // Check 8: Squash commit message has content
                const squashMatch = stripped.match(
                  /##\s+Suggested Squash Commit Message\s*\n([\s\S]*?)(?=\n##|$)/
                );
                if (squashMatch) {
                  const hasCodeBlock = /```[\s\S]*?[^\s][\s\S]*?```/.test(
                    squashMatch[1]
                  );
                  if (!hasCodeBlock) {
                    descriptionErrors.push(
                      'Suggested Squash Commit Message must contain a code block with content'
                    );
                  }
                }
              }
            }

            // --- EDF Study File Check (all PRs) ---
            let studyErrors = [];
            const studySectionMatch = stripped.match(/##\s+Study\s*\n([\s\S]*?)(?=\n##|$)/);
            if (studySectionMatch) {
              const studyText = studySectionMatch[1].trim();
              const isNotApplicable = /not applicable/i.test(studyText);
              const hasPlaceholder = studyText.includes('COMPONENT_ID');
              // Extract a docs/studies/ path if present
              const studyFileMatch = studyText.match(/`(docs\/studies\/[^\s`]+\.md)`/) ||
                                     studyText.match(/(docs\/studies\/\S+\.md)/);
              if (studyFileMatch) {
                const studyFile = studyFileMatch[1];
                const studyExists = require('fs').existsSync(studyFile);
                if (!studyExists) {
                  studyErrors.push(
                    `Study file \`${studyFile}\` listed in the PR does not exist in the repo. Create it from \`docs/study-template.md\` before merging.`
                  );
                }
              } else if (!isNotApplicable && !hasPlaceholder && studyText.length > 3) {
                studyErrors.push(
                  'Study section should either say "Not applicable" or provide a `docs/studies/<component_id>.md` path so CI can verify it exists.'
                );
              }
            }

            // --- Compose result ---
            const hasGoldenViolations = goldenViolations.length > 0;
            const hasDescriptionErrors = descriptionErrors.length > 0;
            const hasStudyErrors = studyErrors.length > 0;
            const failed = hasGoldenViolations || hasDescriptionErrors || hasStudyErrors;

            let comment;
            if (failed) {
              let sections = [];

              if (hasDescriptionErrors) {
                const items = descriptionErrors
                  .map((e) => `- [ ] ${e}`)
                  .join('\n');
                sections.push(`**PR Description Issues:**\n${items}`);
              }

              if (hasStudyErrors) {
                const items = studyErrors
                  .map((e) => `- [ ] ${e}`)
                  .join('\n');
                sections.push(`**Study Document Issues:**\n${items}`);
              }

              if (hasGoldenViolations) {
                const items = goldenViolations
                  .split('\n')
                  .filter((l) => l.trim())
                  .map((v) => `- [ ] ${v}`)
                  .join('\n');
                sections.push(`**Golden Rule Violations:**\n${items}`);
              }

              comment = `### Hey Claude —\n\nPR validation failed. Fix these issues, commit, and push.\n\n${sections.join('\n\n')}`;
            } else {
              const descResult = descriptionSkipped
                ? '⏭️ skipped (human PR)'
                : '✅ passed';
              const studyResult = studyErrors.length === 0 ? '✅ passed' : '❌ failed';
              comment = `### PR Validation Passed ✅\n\n| Check | Result |\n|---|---|\n| PR Description | ${descResult} |\n| Study Document | ${studyResult} |\n| Golden Rules | ✅ no violations |`;
            }

            core.setOutput('body', comment);
            core.setOutput('failed', failed.toString());

      - name: Post PR validation comment
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: pr-validation
          message: ${{ steps.validate.outputs.body }}

      - name: Fail if validation failed
        if: steps.validate.outputs.failed == 'true'
        run: exit 1

  change-reminders:
    name: Change Reminders
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Analyze changes and compose reminders
        id: analyze
        uses: actions/github-script@v8
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const filenames = files.map((f) => f.filename);
            const totalAdditions = files.reduce((sum, f) => sum + f.additions, 0);
            const totalDeletions = files.reduce((sum, f) => sum + f.deletions, 0);
            const totalChanged = totalAdditions + totalDeletions;
            const fileCount = files.length;
            const reminders = [];

            // PR size guardrails
            if (totalChanged > 500) {
              reminders.push(
                `📏 **Large PR detected:** ${totalChanged} lines changed across ${fileCount} files. Consider whether this should be split into smaller PRs.`
              );
            } else if (fileCount > 15) {
              reminders.push(
                `📏 **Many files touched:** ${fileCount} files changed. Is this one logical change, or should it be split?`
              );
            }

            // Check for new dependencies in package.json
            const pkgFile = files.find((f) => f.filename === 'package.json');
            if (pkgFile && pkgFile.patch) {
              const addedDepLines = pkgFile.patch
                .split('\n')
                .filter(
                  (l) =>
                    l.startsWith('+') &&
                    !l.startsWith('+++') &&
                    /"[@a-z].*":\s*"/.test(l)
                );
              if (addedDepLines.length > 0) {
                reminders.push(
                  '📝 **ADR trigger:** new dependency detected in `package.json`. Check CLAUDE.md → "ADR Triggers" — a new top-level dependency requires an ADR.'
                );
              }
            }

            // Check for tooling config changes
            if (
              filenames.includes('eslint.config.mjs') ||
              filenames.includes('.eslintrc.js') ||
              filenames.includes('.prettierrc') ||
              filenames.includes('.prettierrc.json')
            ) {
              reminders.push(
                '🔧 **Tooling config changed** — did you run `npm run format` on the whole repo?'
              );
            }

            // Check for ADR changes
            if (filenames.some((f) => f.startsWith('docs/adr/') && f !== 'docs/adr/README.md')) {
              if (!filenames.includes('docs/adr/README.md')) {
                reminders.push(
                  '📚 **ADR modified** — did you update the ADR index in `docs/adr/README.md`?'
                );
              }
            }

            // Check for CI workflow changes
            if (filenames.some((f) => f.startsWith('.github/workflows/'))) {
              reminders.push(
                '🏗️ **CI pipeline changed** — this is an ADR trigger per CLAUDE.md.'
              );
            }

            // Check for agent contract changes
            if (
              filenames.includes('CLAUDE.md') ||
              filenames.includes('AGENTS.md')
            ) {
              reminders.push(
                '🤖 **Agent contract changed** — other agents pick up these changes immediately.'
              );
            }

            // Check if new source files were added but CODEBASE.md not updated
            const hasNewSourceFiles = files.some(
              (f) =>
                f.status === 'added' &&
                /\.(js|css|html)$/.test(f.filename) &&
                !f.filename.endsWith('.test.js')
            );
            const codebaseMapUpdated = filenames.includes('CODEBASE.md');
            if (hasNewSourceFiles && !codebaseMapUpdated) {
              reminders.push(
                '🗺️ **CODEBASE.md not updated** — new source files were added. Update the codebase map so the next session skips the exploration phase.'
              );
            }

            // --- EDF Metadata Checks ---
            const fs = require('fs');

            // 1. Metadata changed on existing component files → warn
            const metadataFields = ['component_id', 'type:', 'status:', 'audience:', 'framework:', 'depends_on'];
            const modifiedComponentFiles = files.filter(f =>
              f.status === 'modified' &&
              (f.filename.endsWith('.js') || f.filename.endsWith('.html') || f.filename.endsWith('.css'))
            );
            for (const file of modifiedComponentFiles) {
              if (file.patch) {
                const patchLines = file.patch.split('\n');
                const metadataChanged = metadataFields.some(field =>
                  patchLines.some(l =>
                    (l.startsWith('+') || l.startsWith('-')) &&
                    !l.startsWith('+++') &&
                    !l.startsWith('---') &&
                    l.includes(field)
                  )
                );
                if (metadataChanged) {
                  reminders.push(
                    `🏷️ **Metadata changed in \`${file.filename}\`** — was this intentional? Verify all \`depends_on\` references to this component are still accurate and the \`component_id\` version was bumped if the API changed.`
                  );
                }
              }
            }

            // 2. New source files without metadata block → reminder
            const newSourceFiles2 = files.filter(f =>
              f.status === 'added' &&
              (f.filename.endsWith('.js') || f.filename.endsWith('.html')) &&
              !f.filename.includes('node_modules') &&
              !f.filename.endsWith('.test.js') &&
              !f.filename.endsWith('.config.js')
            );
            for (const file of newSourceFiles2) {
              const hasMetadata = file.patch && file.patch.includes('component_id');
              if (!hasMetadata) {
                reminders.push(
                  `🏷️ **New file without metadata block: \`${file.filename}\`** — if this is an EDF component (pattern-maker, world, pressure, or readout), it needs the 6-field metadata block per CLAUDE.md Golden Rule 7. See \`docs/metadata-convention.md\`. If it's a utility file, ignore this.`
                );
              }
            }

            // --- ADR Drift Detection ---
            const adrPath = 'docs/adr';
            let adrEntries = [];
            try {
              adrEntries = fs.readdirSync(adrPath).filter(
                (f) =>
                  f.endsWith('.md') &&
                  f !== 'README.md' &&
                  f !== 'template.md'
              );
            } catch {
              // docs/adr/ may not exist yet — skip silently
            }

            const driftWarnings = [];
            for (const adrFile of adrEntries) {
              const content = fs.readFileSync(`${adrPath}/${adrFile}`, 'utf8');

              const tpMatch = content.match(
                /### Touchpoints\s*\n([\s\S]*?)(?=\n###\s|\n##\s|$)/
              );
              if (!tpMatch) continue;

              const touchpoints = [];
              for (const line of tpMatch[1].split('\n')) {
                const m = line.match(/^[-*+] `([^`]+)`/);
                if (
                  m &&
                  !m[1].startsWith('npm ') &&
                  !m[1].startsWith('grep ')
                ) {
                  touchpoints.push(m[1]);
                }
              }
              if (touchpoints.length === 0) continue;

              const hits = touchpoints.filter((tp) => {
                if (tp.endsWith('/')) {
                  return filenames.some((f) => f.startsWith(tp));
                }
                return filenames.includes(tp);
              });

              if (hits.length > 0) {
                const adrNum = adrFile.match(/^(\d+)/)?.[1] || adrFile;
                driftWarnings.push(
                  `**ADR-${adrNum}** (\`${adrPath}/${adrFile}\`): ${hits.map((h) => '`' + h + '`').join(', ')}`
                );
              }
            }

            if (driftWarnings.length > 0) {
              reminders.push(
                `🔗 **ADR drift risk — changed files match ADR touchpoints.** Verify each ADR's invariants are still accurate:\n${driftWarnings.map((w) => `  - ${w}`).join('\n')}`
              );
            }

            const hasReminders = reminders.length > 0;

            let comment = '';
            if (hasReminders) {
              comment = `### Change-Aware Reminders\n\nThese are advisory — not blocking merge.\n\n${reminders.map((r) => `- ${r}`).join('\n')}`;
            }

            core.setOutput('has_reminders', hasReminders.toString());
            core.setOutput('body', comment);

      - name: Post change reminders
        if: steps.analyze.outputs.has_reminders == 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: change-reminders
          message: ${{ steps.analyze.outputs.body }}

      - name: Clear reminders if none apply
        if: steps.analyze.outputs.has_reminders != 'true'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: change-reminders
          delete: true
